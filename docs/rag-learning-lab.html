.form-range:focus-visible::-moz-range-thumb {

.form-range:disabled {

&lt;body&gt;
&lt;div id=&quot;rag-learning-lab&quot;&gt;
  &lt;style&gt;
    #rag-learning-lab {
      --lab-bg: #f6f7fb;
      --lab-panel: #ffffff;
      --lab-text: #172033;
      --lab-muted: #5d687b;
      --lab-border: #dce1ea;
      --lab-primary: #2457d6;
      --lab-primary-soft: #e9efff;
      --lab-accent: #0c7c68;
      --lab-accent-soft: #e1f4ef;
      --lab-warning: #9a5a00;
      --lab-warning-soft: #fff2d8;
      --lab-code: #111827;
      --lab-code-text: #e7edf7;
      color: var(--lab-text);
      background: var(--lab-bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;
      line-height: 1.55;
      min-height: 100%;
    }

    @media (prefers-color-scheme: dark) {
      #rag-learning-lab {
        --lab-bg: #0f1420;
        --lab-panel: #171e2c;
        --lab-text: #edf1f7;
        --lab-muted: #aab4c5;
        --lab-border: #313b4d;
        --lab-primary: #8aa8ff;
        --lab-primary-soft: #22325b;
        --lab-accent: #66d5bf;
        --lab-accent-soft: #183d37;
        --lab-warning: #f0bd68;
        --lab-warning-soft: #483719;
        --lab-code: #090d15;
        --lab-code-text: #e7edf7;
      }
    }

    #rag-learning-lab * { box-sizing: border-box; }
    #rag-learning-lab button,
    #rag-learning-lab select,
    #rag-learning-lab input { font: inherit; }
    #rag-learning-lab button { cursor: pointer; }
    #rag-learning-lab button:focus-visible,
    #rag-learning-lab select:focus-visible,
    #rag-learning-lab input:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--lab-primary) 45%, transparent);
      outline-offset: 2px;
    }

    .lab-shell { max-width: 1180px; margin: 0 auto; padding: 28px 20px 48px; }
    .lab-hero { display: grid; gap: 12px; margin-bottom: 24px; }
    .lab-eyebrow { color: var(--lab-primary); font-weight: 500; letter-spacing: .06em; text-transform: uppercase; font-size: .78rem; }
    .lab-hero h1 { margin: 0; font-size: clamp(1.8rem, 4vw, 3rem); line-height: 1.08; font-weight: 500; }
    .lab-hero p { margin: 0; color: var(--lab-muted); max-width: 780px; }
    .lab-progress-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .lab-progress-track { flex: 1 1 280px; height: 8px; background: var(--lab-border); border-radius: 999px; overflow: hidden; }
    .lab-progress-fill { height: 100%; width: 0; background: var(--lab-accent); transition: width .25s ease; }
    .lab-progress-label { color: var(--lab-muted); font-size: .9rem; }

    .lab-pipeline { display: grid; grid-template-columns: repeat(8, minmax(105px, 1fr)); gap: 8px; margin-bottom: 24px; overflow-x: auto; padding: 2px; }
    .lab-stage {
      border: 1px solid var(--lab-border);
      background: var(--lab-panel);
      color: var(--lab-text);
      border-radius: 12px;
      padding: 10px 8px;
      min-height: 64px;
      text-align: left;
      display: grid;
      align-content: center;
      gap: 2px;
    }
    .lab-stage span { color: var(--lab-muted); font-size: .75rem; }
    .lab-stage strong { font-size: .86rem; font-weight: 500; }
    .lab-stage[aria-pressed=&quot;true&quot;] { border-color: var(--lab-primary); background: var(--lab-primary-soft); }
    .lab-stage.is-complete strong::after { content: &quot;  ✓&quot;; color: var(--lab-accent); }

    .lab-panel { background: var(--lab-panel); border: 1px solid var(--lab-border); border-radius: 18px; padding: clamp(18px, 3vw, 32px); }
    .lab-panel[hidden] { display: none; }
    .lab-panel-head { display: grid; gap: 6px; margin-bottom: 22px; }
    .lab-panel-head h2 { margin: 0; font-size: clamp(1.35rem, 2.8vw, 2rem); font-weight: 500; }
    .lab-panel-head p { margin: 0; color: var(--lab-muted); max-width: 800px; }
    .lab-section-ref { color: var(--lab-primary); font-size: .82rem; font-weight: 500; }

    .lab-controls { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 18px; align-items: end; }
    .lab-button {
      border: 1px solid var(--lab-border);
      color: var(--lab-text);
      background: var(--lab-panel);
      border-radius: 10px;
      padding: 8px 12px;
    }
    .lab-button[aria-pressed=&quot;true&quot;], .lab-button.is-active { background: var(--lab-primary); color: #fff; border-color: var(--lab-primary); }
    @media (prefers-color-scheme: dark) {
      .lab-button[aria-pressed=&quot;true&quot;], .lab-button.is-active { color: #101725; }
    }
    .lab-button-secondary { background: var(--lab-primary-soft); border-color: color-mix(in srgb, var(--lab-primary) 35%, var(--lab-border)); }
    .lab-field { display: grid; gap: 5px; min-width: min(100%, 220px); }
    .lab-field label { color: var(--lab-muted); font-size: .84rem; }
    .lab-select, .lab-range {
      width: 100%;
      border: 1px solid var(--lab-border);
      background: var(--lab-panel);
      color: var(--lab-text);
      border-radius: 10px;
      padding: 8px 10px;
    }
    .lab-range { padding: 6px 0; }

    .lab-grid-2, .lab-grid-3 { display: grid; gap: 16px; }
    .lab-grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .lab-grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .lab-block { min-width: 0; }
    .lab-block h3 { margin: 0 0 8px; font-size: 1rem; font-weight: 500; }
    .lab-block p { margin: 0; color: var(--lab-muted); }
    .lab-card { border: 1px solid var(--lab-border); border-radius: 14px; padding: 16px; background: var(--lab-panel); }
    .lab-card strong { font-weight: 500; }
    .lab-callout { border-left: 4px solid var(--lab-accent); padding: 10px 14px; background: var(--lab-accent-soft); margin: 18px 0; }
    .lab-warning { border-left-color: var(--lab-warning); background: var(--lab-warning-soft); }
    .lab-callout p { margin: 0; }

    .lab-code { background: var(--lab-code); color: var(--lab-code-text); border-radius: 12px; padding: 14px; overflow-wrap: anywhere; white-space: pre-wrap; margin: 0; font: 0.86rem/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .lab-label { display: inline-flex; align-items: center; border: 1px solid var(--lab-border); border-radius: 999px; padding: 3px 8px; font-size: .78rem; color: var(--lab-muted); margin: 2px 4px 2px 0; }
    .lab-label.is-exact { background: var(--lab-primary-soft); color: var(--lab-text); }
    .lab-label.is-semantic { background: var(--lab-accent-soft); color: var(--lab-text); }
    .lab-arrow { color: var(--lab-muted); font-size: 1.25rem; align-self: center; justify-self: center; }

    .lab-doc-flow { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; gap: 10px; align-items: stretch; }
    .lab-doc-flow .lab-card { overflow: hidden; }
    .lab-doc-flow pre { max-height: 340px; overflow: auto; }

    .lab-chunk-list { display: grid; gap: 10px; margin-top: 16px; }
    .lab-chunk { position: relative; border-left: 6px solid var(--lab-primary); background: var(--lab-primary-soft); padding: 12px 14px; border-radius: 8px; }
    .lab-chunk:nth-child(even) { border-left-color: var(--lab-accent); background: var(--lab-accent-soft); }
    .lab-chunk-head { display: flex; justify-content: space-between; gap: 8px; color: var(--lab-muted); font-size: .8rem; margin-bottom: 5px; }

    .lab-flowline { display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr)); gap: 10px; overflow-x: auto; padding-bottom: 4px; }
    .lab-flowstep { border-top: 4px solid var(--lab-border); padding-top: 10px; }
    .lab-flowstep.is-active { border-top-color: var(--lab-primary); }
    .lab-flowstep strong { display: block; font-weight: 500; margin-bottom: 4px; }
    .lab-flowstep span { color: var(--lab-muted); font-size: .84rem; }

    .lab-retrieval-layout { display: grid; grid-template-columns: minmax(0, .85fr) minmax(0, 1.15fr); gap: 18px; }
    .lab-result-list { display: grid; gap: 8px; }
    .lab-result { border: 1px solid var(--lab-border); border-radius: 10px; padding: 10px 12px; }
    .lab-result small { color: var(--lab-muted); }

    .lab-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .lab-tab-content { min-height: 240px; }
    .lab-evidence-list { display: grid; gap: 10px; }

    .lab-split { display: grid; grid-template-columns: 3fr 2fr; gap: 16px; }
    .lab-case-dots { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .lab-dot { width: 28px; height: 28px; display: inline-grid; place-items: center; border-radius: 50%; background: var(--lab-primary-soft); color: var(--lab-text); font-size: .75rem; }
    .lab-dot.holdout { background: var(--lab-accent-soft); }

    .lab-metric-list { display: grid; gap: 8px; }
    .lab-metric-button { text-align: left; width: 100%; }
    .lab-metric-button span { display: block; color: var(--lab-muted); font-size: .8rem; }
    .lab-metric-detail { min-height: 260px; }

    .lab-config-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .lab-config-table th, .lab-config-table td { border-bottom: 1px solid var(--lab-border); padding: 8px 6px; text-align: left; vertical-align: top; }
    .lab-config-table th { color: var(--lab-muted); font-weight: 500; font-size: .82rem; }

    .lab-matrix-wrap { overflow-x: auto; }
    .lab-matrix { border-collapse: separate; border-spacing: 6px; min-width: 760px; width: 100%; }
    .lab-matrix th { color: var(--lab-muted); font-weight: 500; font-size: .8rem; text-align: center; }
    .lab-matrix th:first-child { text-align: left; }
    .lab-matrix td:first-child { font-size: .82rem; }
    .lab-matrix button { width: 100%; min-height: 42px; border: 1px solid var(--lab-border); background: var(--lab-panel); color: var(--lab-text); border-radius: 9px; }
    .lab-matrix button[aria-pressed=&quot;true&quot;] { background: var(--lab-primary-soft); border-color: var(--lab-primary); }

    .lab-check { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--lab-border); }
    .lab-check h3 { margin: 0 0 6px; font-size: 1rem; font-weight: 500; }
    .lab-check p { margin: 0 0 10px; }
    .lab-check-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .lab-feedback { margin-top: 10px; min-height: 24px; color: var(--lab-muted); }
    .lab-feedback.is-correct { color: var(--lab-accent); }
    .lab-feedback.is-wrong { color: var(--lab-warning); }

    .lab-footer-nav { display: flex; justify-content: space-between; gap: 12px; margin-top: 20px; }

    @media (max-width: 820px) {
      .lab-grid-3, .lab-doc-flow { grid-template-columns: 1fr; }
      .lab-doc-flow .lab-arrow { transform: rotate(90deg); }
      .lab-retrieval-layout, .lab-grid-2 { grid-template-columns: 1fr; }
      .lab-pipeline { grid-template-columns: repeat(8, 132px); }
    }

    @media (max-width: 520px) {
      .lab-shell { padding: 18px 12px 34px; }
      .lab-panel { border-radius: 12px; padding: 16px; }
      .lab-split { grid-template-columns: 1fr; }
      .lab-footer-nav { flex-direction: column; }
      .lab-footer-nav .lab-button { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .lab-progress-fill { transition: none; }
    }
  &lt;/style&gt;

  &lt;div class=&quot;lab-shell&quot;&gt;
    &lt;header class=&quot;lab-hero&quot;&gt;
      &lt;span class=&quot;lab-eyebrow&quot;&gt;UTAIGA Project 2 · Interactive learning path&lt;/span&gt;
      &lt;h1&gt;Grounded Investment Assistant: RAG Learning Lab&lt;/h1&gt;
      &lt;p&gt;Recorre el pipeline de Full Code Notebook v3 desde los archivos originales hasta la evaluación de los cinco casos oficiales. Cada etapa conecta teoría, código y una decisión observable.&lt;/p&gt;
      &lt;div class=&quot;lab-progress-row&quot;&gt;
        &lt;div class=&quot;lab-progress-track&quot; aria-hidden=&quot;true&quot;&gt;&lt;div class=&quot;lab-progress-fill&quot; id=&quot;lab-progress-fill&quot;&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;span class=&quot;lab-progress-label&quot; id=&quot;lab-progress-label&quot;&gt;0 de 8 conceptos comprobados&lt;/span&gt;
      &lt;/div&gt;
    &lt;/header&gt;

    &lt;nav class=&quot;lab-pipeline&quot; aria-label=&quot;Módulos del laboratorio&quot; id=&quot;lab-module-nav&quot;&gt;&lt;/nav&gt;

    &lt;main&gt;
      &lt;section class=&quot;lab-panel&quot; data-panel=&quot;documents&quot; aria-labelledby=&quot;documents-title&quot;&gt;
        &lt;div class=&quot;lab-panel-head&quot;&gt;
          &lt;span class=&quot;lab-section-ref&quot;&gt;Notebook 1.1–1.2&lt;/span&gt;
          &lt;h2 id=&quot;documents-title&quot;&gt;De raw data a LangChain Document&lt;/h2&gt;
          &lt;p&gt;Observa cómo cada fuente produce unidades recuperables con contenido semántico y metadata exacta.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;lab-controls&quot; id=&quot;source-controls&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;lab-doc-flow&quot; aria-live=&quot;polite&quot;&gt;
          &lt;div class=&quot;lab-card lab-block&quot;&gt;&lt;h3&gt;1 · Registro original&lt;/h3&gt;&lt;pre class=&quot;lab-code&quot; id=&quot;raw-record&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
          &lt;div class=&quot;lab-arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;lab-card lab-block&quot;&gt;&lt;h3&gt;2 · Document&lt;/h3&gt;&lt;pre class=&quot;lab-code&quot; id=&quot;document-record&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
          &lt;div class=&quot;lab-arrow&quot; aria-hidden=&quot;true&quot;&gt;→&lt;/div&gt;
          &lt;div class=&quot;lab-card lab-block&quot;&gt;&lt;h3&gt;3 · Uso en RAG&lt;/h3&gt;&lt;div id=&quot;document-uses&quot;&gt;&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;lab-callout&quot;&gt;&lt;p&gt;&lt;strong&gt;Regla:&lt;/strong&gt; &lt;code&gt;page_content&lt;/code&gt; se convierte en embedding; &lt;code&gt;metadata&lt;/code&gt; permite filtros, trazabilidad y citas.&lt;/p&gt;&lt;/div&gt;
      &lt;/section&gt;

      &lt;section class=&quot;lab-panel&quot; data-panel=&quot;chunking&quot; aria-labelledby=&quot;chunking-title&quot; hidden&gt;
        &lt;div class=&quot;lab-panel-head&quot;&gt;
          &lt;span class=&quot;lab-section-ref&quot;&gt;Notebook 1.2&lt;/span&gt;
          &lt;h2 id=&quot;chunking-title&quot;&gt;Laboratorio de chunking&lt;/h2&gt;
          &lt;p&gt;Ajusta tamaño y overlap para observar el balance entre contexto, precisión y duplicación.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;lab-controls&quot;&gt;
          &lt;div class=&quot;lab-field&quot;&gt;

            &lt;input class=&quot;lab-range&quot; id=&quot;chunk-size&quot; type=&quot;range&quot; min=&quot;500&quot; max=&quot;1400&quot; step=&quot;100&quot; value=&quot;1000&quot;&gt;
          &lt;/div&gt;
          &lt;div class=&quot;lab-field&quot;&gt;

            &lt;input class=&quot;lab-range&quot; id=&quot;chunk-overlap&quot; type=&quot;range&quot; min=&quot;0&quot; max=&quot;400&quot; step=&quot;50&quot; value=&quot;200&quot;&gt;

          &lt;div class=&quot;lab-card&quot;&gt;&lt;strong&gt;Page 12&lt;/strong&gt;&lt;p&gt;provenance heredada por cada chunk&lt;/p&gt;&lt;/div&gt;

      &lt;/section&gt;

      &lt;section class=&quot;lab-panel&quot; data-panel=&quot;chroma&quot; aria-labelledby=&quot;chroma-title&quot; hidden&gt;
        &lt;div class=&quot;lab-panel-head&quot;&gt;
          &lt;span class=&quot;lab-section-ref&quot;&gt;Notebook 1.3&lt;/span&gt;
          &lt;h2 id=&quot;chroma-title&quot;&gt;Embeddings, IDs y una colección Chroma&lt;/h2&gt;

          &lt;div class=&quot;lab-flowstep is-active&quot;&gt;&lt;strong&gt;page_content&lt;/strong&gt;&lt;span&gt;Entrada a text-embedding-3-small&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;lab-flowstep is-active&quot;&gt;&lt;strong&gt;Embedding&lt;/strong&gt;&lt;span&gt;Representación semántica comparable&lt;/span&gt;&lt;/div&gt;

          &lt;div class=&quot;lab-flowstep is-active&quot;&gt;&lt;strong&gt;Chroma&lt;/strong&gt;&lt;span&gt;investment_rag_v2&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;lab-grid-2&quot; style=&quot;margin-top:18px&quot;&gt;
          &lt;div class=&quot;lab-card lab-block&quot;&gt;&lt;h3&gt;Contenido embebido&lt;/h3&gt;&lt;pre class=&quot;lab-code&quot; id=&quot;embed-content&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
          &lt;div class=&quot;lab-card lab-block&quot;&gt;&lt;h3&gt;Metadata no embebida&lt;/h3&gt;&lt;pre class=&quot;lab-code&quot; id=&quot;embed-metadata&quot;&gt;&lt;/pre&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;lab-callout&quot;&gt;&lt;p&gt;Una colección permite búsquedas cruzadas. El campo &lt;code&gt;dataset&lt;/code&gt; mantiene la capacidad de limitar cada búsqueda a la fuente correcta.&lt;/p&gt;&lt;/div&gt;

      &lt;section class=&quot;lab-panel&quot; data-panel=&quot;retrieval&quot; aria-labelledby=&quot;retrieval-title&quot; hidden&gt;
        &lt;div class=&quot;lab-panel-head&quot;&gt;
          &lt;span class=&quot;lab-section-ref&quot;&gt;Notebook 1.4&lt;/span&gt;
          &lt;h2 id=&quot;retrieval-title&quot;&gt;Router, filtros exactos y búsqueda semántica&lt;/h2&gt;
          &lt;p&gt;Selecciona una pregunta y observa cómo se transforma en un plan de recuperación verificable.&lt;/p&gt;
        &lt;/div&gt;
        &lt;div class=&quot;lab-controls&quot;&gt;
          &lt;div class=&quot;lab-field&quot; style=&quot;flex:1 1 420px&quot;&gt;
            &lt;label for=&quot;retrieval-case&quot;&gt;Pregunta&lt;/label&gt;
            &lt;select class=&quot;lab-select&quot; id=&quot;retrieval-case&quot;&gt;&lt;/select&gt;
          &lt;/div&gt;
          &lt;label class=&quot;lab-field&quot; id=&quot;fallback-wrap&quot;&gt;
            &lt;span&gt;Simulación&lt;/span&gt;
            &lt;span&gt;&lt;input id=&quot;fallback-toggle&quot; type=&quot;checkbox&quot;&gt; La fecha exacta no existe&lt;/span&gt;
          &lt;/label&gt;

        chroma: { question: &quot;¿Por qué el ID determinista ayuda al notebook?&quot;, options: [&quot;Hace el embedding más grande&quot;, &quot;Evita identidades aleatorias al reejecutar&quot;, &quot;Reemplaza metadata&quot;], correct: 1, feedback: &quot;El mismo contenido y metadata producen la misma identidad reproducible.&quot; },

        optimization: { question: &quot;¿Qué componente modifica GEPA en este proyecto?&quot;, options: [&quot;El prompt&quot;, &quot;El embedding model&quot;, &quot;La raw data&quot;], correct: 0, feedback: &quot;GEPA propone cambios al prompt; el tuning de retrieval ocurre después.&quot; },
        official: { question: &quot;¿Por qué no se calcula Answer Correctness en los cinco casos oficiales?&quot;, options: [&quot;Porque son demasiados&quot;, &quot;Porque no tienen expected_output humano&quot;, &quot;Porque Chroma no devuelve scores&quot;], correct: 1, feedback: &quot;Correctness necesita una respuesta de referencia para comparar.&quot; }
      };

      let activeModule = 0;

      const escapeHTML = value =&gt; String(value).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, char =&gt; ({ &quot;&amp;&quot;: &quot;&amp;amp;&quot;, &quot;&lt;&quot;: &quot;&amp;lt;&quot;, &quot;&gt;&quot;: &quot;&amp;gt;&quot;, &quot;&#x27;&quot;: &quot;&amp;#39;&quot;, &#x27;&quot;&#x27;: &quot;&amp;quot;&quot; }[char]));

      function renderNavigation() {

        ].join(&quot;&quot;);
        const results = fallback ? item.fallbackResults : item.results;
        root.querySelector(&quot;#route-results&quot;).innerHTML = results.map((result, index) =&gt; `&lt;div class=&quot;lab-result&quot;&gt;&lt;strong&gt;${index + 1}. ${escapeHTML(result)}&lt;/strong&gt;&lt;br&gt;&lt;small&gt;${fallback ? &quot;Related evidence after relaxing date&quot; : &quot;Passed metadata filter, then ranked semantically&quot;}&lt;/small&gt;&lt;/div&gt;`).join(&quot;&quot;);
        root.querySelector(&quot;#fallback-note&quot;).className = fallback ? &quot;lab-callout lab-warning&quot; : &quot;lab-callout&quot;;
        root.querySelector(&quot;#fallback-note&quot;).innerHTML = fallback
          ? &quot;&lt;p&gt;&lt;strong&gt;Fallback active:&lt;/strong&gt; se conserva AAPL, se elimina la fecha exacta. La respuesta debe reconocer esta limitación.&lt;/p&gt;&quot;
          : &quot;&lt;p&gt;&lt;strong&gt;Metadata decide quién puede competir.&lt;/strong&gt; Los embeddings deciden cuáles documentos ganan.&lt;/p&gt;&quot;;
      }
      retrievalSelect.addEventListener(&quot;change&quot;, renderRetrieval);

      renderRetrieval();

      const contextViews = {
        documents: `&lt;div class=&quot;lab-evidence-list&quot;&gt;&lt;div class=&quot;lab-result&quot;&gt;&lt;strong&gt;Document 1&lt;/strong&gt;&lt;br&gt;AAPL closed at $199.25 on 2025-04-28.&lt;br&gt;&lt;small&gt;stock_price_details.csv · row 42&lt;/small&gt;&lt;/div&gt;&lt;div class=&quot;lab-result&quot;&gt;&lt;strong&gt;Document 2&lt;/strong&gt;&lt;br&gt;AAPL trading volume increased during the session.&lt;br&gt;&lt;small&gt;stock_price_details.csv · row 43&lt;/small&gt;&lt;/div&gt;&lt;/div&gt;`,
        formatted: `&lt;pre class=&quot;lab-code&quot;&gt;Corpus snapshot date: 2025-04-30

[Source 1] AAPL closed at $199.25 on 2025-04-28.
Metadata: stock_price_details.csv | row 42

[Source 2] AAPL trading volume increased during the session.
Metadata: stock_price_details.csv | row 43&lt;/pre&gt;`,
        prompt: `&lt;pre class=&quot;lab-code&quot;&gt;System: Use only the retrieved context. If evidence is insufficient, say what is missing.

Question:
What was Apple&#x27;s stock price on 2025-04-28?

Retrieved context:
[Source 1] AAPL closed at $199.25...

Answer with a direct response and a short Sources section.&lt;/pre&gt;`,
        answer: `&lt;div class=&quot;lab-callout&quot;&gt;&lt;p&gt;&lt;strong&gt;Answer:&lt;/strong&gt; Apple closed at $199.25 on April 28, 2025.&lt;br&gt;&lt;br&gt;&lt;strong&gt;Sources:&lt;/strong&gt; [Source 1]&lt;/p&gt;&lt;/div&gt;&lt;p style=&quot;color:var(--lab-muted)&quot;&gt;La respuesta es un ejemplo educativo, no un resultado de ejecución de v3.&lt;/p&gt;`
      };
      function renderContextTab(key) {
        root.querySelectorAll(&quot;[data-context-tab]&quot;).forEach(button =&gt; { const active = button.dataset.contextTab === key; button.classList.toggle(&quot;is-active&quot;, active); button.setAttribute(&quot;aria-pressed&quot;, active); });
        root.querySelector(&quot;#context-content&quot;).innerHTML = contextViews[key];
      }
      root.querySelectorAll(&quot;[data-context-tab]&quot;).forEach(button =&gt; button.addEventListener(&quot;click&quot;, () =&gt; renderContextTab(button.dataset.contextTab)));
      renderContextTab(&quot;documents&quot;);

      root.querySelector(&quot;#optimization-dots&quot;).innerHTML = Array.from({ length: 12 }, (_, index) =&gt; `&lt;span class=&quot;lab-dot&quot;&gt;${index + 1}&lt;/span&gt;`).join(&quot;&quot;);
      root.querySelector(&quot;#holdout-dots&quot;).innerHTML = Array.from({ length: 8 }, (_, index) =&gt; `&lt;span class=&quot;lab-dot holdout&quot;&gt;${index + 13}&lt;/span&gt;`).join(&quot;&quot;);
      const metricList = root.querySelector(&quot;#metric-list&quot;);
      metricList.innerHTML = metrics.map((metric, index) =&gt; `&lt;button class=&quot;lab-button lab-metric-button ${index === 0 ? &quot;is-active&quot; : &quot;&quot;}&quot; data-metric-index=&quot;${index}&quot;&gt;${escapeHTML(metric.name)}&lt;span&gt;${escapeHTML(metric.owner)}&lt;/span&gt;&lt;/button&gt;`).join(&quot;&quot;);
      function renderMetric(index) {
        const metric = metrics[index];

        root.querySelector(&quot;#metric-detail&quot;).innerHTML = `&lt;h3&gt;${escapeHTML(metric.name)}&lt;/h3&gt;&lt;p&gt;&lt;strong&gt;Pregunta:&lt;/strong&gt; ${escapeHTML(metric.question)}&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Campos:&lt;/strong&gt;&lt;br&gt;${metric.fields.map(field =&gt; `&lt;span class=&quot;lab-label&quot;&gt;${escapeHTML(field)}&lt;/span&gt;`).join(&quot;&quot;)}&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Necesita expected_output:&lt;/strong&gt; ${metric.reference ? &quot;Sí&quot; : &quot;No&quot;}&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Ejemplo de fallo:&lt;/strong&gt;&lt;br&gt;${escapeHTML(metric.failure)}&lt;/p&gt;`;
      }
      metricList.querySelectorAll(&quot;[data-metric-index]&quot;).forEach(button =&gt; button.addEventListener(&quot;click&quot;, () =&gt; renderMetric(Number(button.dataset.metricIndex))));
      renderMetric(0);

      const configControls = root.querySelector(&quot;#config-controls&quot;);
      configControls.innerHTML = Object.entries(configs).map(([key, config], index) =&gt; `&lt;button class=&quot;lab-button&quot; data-config-key=&quot;${key}&quot; aria-pressed=&quot;${index === 0}&quot;&gt;${escapeHTML(config.name)}&lt;/button&gt;`).join(&quot;&quot;);
      function renderConfig(key) {
        const config = configs[key];
        configControls.querySelectorAll(&quot;[data-config-key]&quot;).forEach(button =&gt; button.setAttribute(&quot;aria-pressed&quot;, button.dataset.configKey === key));
        root.querySelector(&quot;#config-title&quot;).textContent = config.name;
        root.querySelector(&quot;#config-rationale&quot;).textContent = config.rationale;
        root.querySelector(&quot;#config-table&quot;).innerHTML = `&lt;tbody&gt;${Object.entries(config.values).map(([label, value]) =&gt; `&lt;tr&gt;&lt;th&gt;${escapeHTML(label)}&lt;/th&gt;&lt;td&gt;${escapeHTML(value)}&lt;/td&gt;&lt;/tr&gt;`).join(&quot;&quot;)}&lt;/tbody&gt;`;
      }
      configControls.querySelectorAll(&quot;[data-config-key]&quot;).forEach(button =&gt; button.addEventListener(&quot;click&quot;, () =&gt; renderConfig(button.dataset.configKey)));
      renderConfig(&quot;precision&quot;);

      const matrix = root.querySelector(&quot;#official-matrix&quot;);
      matrix.innerHTML = `&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Pipeline&lt;/th&gt;${officialCases.map(item =&gt; `&lt;th&gt;Case ${item.id}&lt;br&gt;${escapeHTML(item.short)}&lt;/th&gt;`).join(&quot;&quot;)}&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${pipelines.map((pipeline, pipelineIndex) =&gt; `&lt;tr&gt;&lt;td&gt;${escapeHTML(pipeline)}&lt;/td&gt;${officialCases.map((item, caseIndex) =&gt; `&lt;td&gt;&lt;button data-pipeline-index=&quot;${pipelineIndex}&quot; data-case-index=&quot;${caseIndex}&quot; aria-pressed=&quot;${pipelineIndex === 0 &amp;&amp; caseIndex === 0}&quot;&gt;Pending&lt;/button&gt;&lt;/td&gt;`).join(&quot;&quot;)}&lt;/tr&gt;`).join(&quot;&quot;)}&lt;/tbody&gt;`;
      function renderOfficial(pipelineIndex, caseIndex) {
        const pipeline = pipelines[pipelineIndex];
        const item = officialCases[caseIndex];
        matrix.querySelectorAll(&quot;button&quot;).forEach(button =&gt; button.setAttribute(&quot;aria-pressed&quot;, Number(button.dataset.pipelineIndex) === pipelineIndex &amp;&amp; Number(button.dataset.caseIndex) === caseIndex));
        root.querySelector(&quot;#official-detail&quot;).innerHTML = `&lt;h3&gt;Case ${item.id} · ${escapeHTML(pipeline)}&lt;/h3&gt;&lt;p&gt;${escapeHTML(item.question)}&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Expected datasets:&lt;/strong&gt;&lt;br&gt;${item.datasets.map(value =&gt; `&lt;span class=&quot;lab-label&quot;&gt;${escapeHTML(value)}&lt;/span&gt;`).join(&quot;&quot;)}&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Required entities:&lt;/strong&gt;&lt;br&gt;${item.entities.map(value =&gt; `&lt;span class=&quot;lab-label&quot;&gt;${escapeHTML(value)}&lt;/span&gt;`).join(&quot;&quot;)}&lt;/p&gt;&lt;p&gt;&lt;strong&gt;Execution status:&lt;/strong&gt; Pending notebook v3 execution.&lt;/p&gt;`;
      }
      matrix.querySelectorAll(&quot;button&quot;).forEach(button =&gt; button.addEventListener(&quot;click&quot;, () =&gt; renderOfficial(Number(button.dataset.pipelineIndex), Number(button.dataset.caseIndex))));
      renderOfficial(0, 0);

      root.querySelector(&quot;#previous-module&quot;).addEventListener(&quot;click&quot;, () =&gt; showModule(activeModule - 1));
      root.querySelector(&quot;#next-module&quot;).addEventListener(&quot;click&quot;, () =&gt; showModule(activeModule === modules.length - 1 ? 0 : activeModule + 1));

      updateProgress();
      showModule(0);
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)

    );

      ids.add(tooltipId);

      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);

    }
  };

  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
